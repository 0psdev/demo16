apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: https-gateway # Name of the Gateway
  namespace: envoy-gateway-system
spec:
  gatewayClassName: gw # Reference to the GatewayClass
  listeners:
    - name: http-app
      protocol: HTTP
      port: 80 # Port number for the listener
      allowedRoutes:
        namespaces:
          from: All
    - name: https-app
      protocol: HTTP
      port: 443
      allowedRoutes:
        namespaces:
          from: All