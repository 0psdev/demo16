
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: nlb-config # Name of the EnvoyProxy
  namespace: envoy-gateway-system
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyService:
        type: LoadBalancer
        externalTrafficPolicy: Cluster
        annotations:
          service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
          service.beta.kubernetes.io/aws-load-balancer-internal: "true" # Set to "true" for internal load balancer
          service.beta.kubernetes.io/aws-load-balancer-subnets: "subnet-xxxx,subnet-xxxx" # Replace with your subnet IDs
          service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true" # Enable cross-zone load balancing
