
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: nlb-config # Name of the EnvoyProxy
  namespace: envoy-gateway-system
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyService:
        type: LoadBalancer
        externalTrafficPolicy: Cluster
        annotations:
          service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
          service.beta.kubernetes.io/aws-load-balancer-internal: "false" # Set to "true" for internal load balancer
          service.beta.kubernetes.io/aws-load-balancer-subnets: "subnet-aaaaaaaaaaa,  subnet-bbbbbbbbbbbbb , subnet-ccccccccccc" # shera-th-subnet-private2-ap-southeast-1a and shera-th-subnet-private2-ap-southeast-1b
          service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true" # Enable cross-zone load balancing
          service.beta.kubernetes.io/aws-load-balancer-ssl-cert: "arn:aws:acm:ap-southeast-1:xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx" # SSL certificate ARN in ACM
          service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "443" # Specify the ports for SSL termination 